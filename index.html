<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Vierra</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        :root {
            --wa-chat-bg: #0b141a; 
            --wa-text-main: #ffffff;
            --wa-icon-color: #d1d1d1;
            --new-input-bg: #222222;
            --new-send-bg: #284297; 
            --bubble-ai-bg: #222222; 
            --bubble-user-bg: #284297;
        }

        /* SUPER ANTI-SELEKSI: Mematikan total semua interaksi bawaan browser */
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            box-sizing: border-box;
        }

        /* KECUALI Kotak Input */
        input, textarea {
            -webkit-user-select: auto !important;
            user-select: auto !important;
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden; overscroll-behavior-y: none; 
            background-color: #000;
        }

        body { 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Roboto', sans-serif;
        }

        .wa-container {
            width: 100%; max-width: 450px; height: 100dvh; 
            background-color: var(--wa-chat-bg);
            background-image: url('https://j.top4top.io/p_3802zjlsl0.jpg');
            background-size: cover; background-position: center;
            background-blend-mode: overlay; opacity: 0.95;
            display: flex; flex-direction: column; position: relative;
        }
        
        @media (min-width: 500px) { 
            .wa-container { height: 95vh; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); } 
        }

        .material-symbols-rounded {
            font-size: 26px; color: var(--wa-icon-color); cursor: pointer;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        /* FLOATING HEADER MODERN */
        .header {
            background-color: var(--new-input-bg); 
            margin: 10px 10px 0 10px; /* Diberi margin agar mengambang */
            padding: 10px 15px; 
            display: flex; align-items: center; justify-content: space-between;
            z-index: 10; 
            border-radius: 20px; /* Membulat di semua sisi */
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            height: 60px; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 10px; cursor: pointer; pointer-events: none;}
        .header-left .back-btn { margin-right: -4px; color: var(--wa-text-main); font-size: 24px; pointer-events: auto;}
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
        .contact-info { display: flex; flex-direction: column; margin-left: 2px; }
        .contact-name { font-size: 16px; font-weight: 600; color: var(--wa-text-main); }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .header-icons span { color: var(--wa-text-main); font-size: 22px; transition: color 0.2s; }
        .header-icons span:hover { color: #ff6b6b; } 

        .chat-area {
            flex: 1; padding: 15px 15px 20px 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px; 
            -webkit-overflow-scrolling: touch;
        }

        .message-row { display: flex; width: 100%; margin-bottom: 6px; flex-shrink: 0; }
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        /* BUBBLE CHAT */
        .bubble {
            max-width: 80%; width: fit-content; 
            padding: 8px 14px; 
            font-size: 15px; line-height: 1.45; color: var(--wa-text-main);
            position: relative; word-wrap: break-word; 
            display: flex; flex-direction: column;
            cursor: pointer; 
        }
        .bubble .text { white-space: pre-wrap; pointer-events: none; } 

        .message-row.ai .bubble { background-color: var(--bubble-ai-bg); border-radius: 18px 18px 18px 4px; }
        .message-row.user .bubble { background-color: var(--bubble-user-bg); border-radius: 18px 18px 4px 18px; }

        .meta-data {
            font-size: 11px; color: rgba(255, 255, 255, 0.6); align-self: flex-end;
            margin-top: 4px; display: flex; align-items: center; gap: 4px; pointer-events: none;
        }
        .tick-blue { color: #53bdeb; font-size: 14px; font-variation-settings: 'FILL' 1; }

        .menu-btn {
            background-color: rgba(40, 66, 151, 0.15); color: #7b9cff; border: 1px solid #3753a8;
            padding: 8px 12px; border-radius: 8px; margin-top: 10px; margin-bottom: 2px;
            font-size: 13.5px; font-weight: 500; cursor: pointer; width: 100%;
            transition: all 0.2s; font-family: 'Roboto', sans-serif; text-align: center;
        }

        /* DOWNLOADER CARD CSS */
        .dl-card { width: 260px; padding: 12px; gap: 10px; pointer-events: none; }
        .dl-badge { background-color: #d14747; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; position: absolute; top: 18px; left: 18px; z-index: 2; }
        .dl-thumb { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; background-color: #111; pointer-events: none;}
        .dl-author { font-weight: 600; font-size: 14px; color: #fff; margin-bottom: 2px; margin-top: 8px; pointer-events: none;}
        .dl-title { font-size: 13px; color: #aaa; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; pointer-events: none; }
        .dl-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; pointer-events: auto; } 
        .btn-dl { flex: 1 1 45%; padding: 8px 0; text-align: center; border-radius: 8px; text-decoration: none; color: white; font-size: 13px; font-weight: 600; background-color: var(--new-send-bg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-dl.alt { background-color: #444; }

        /* INPUT AREA */
        .input-area { width: 100%; padding: 10px 15px 20px 15px; display: flex; align-items: center; gap: 12px; background: transparent; flex-shrink: 0; }
        .input-wrapper { flex: 1; background-color: var(--new-input-bg); border-radius: 26px; display: flex; align-items: center; padding: 8px 15px; gap: 12px; height: 52px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 16px; padding: 0; font-family: 'Roboto', sans-serif; width: 100%; }
        .input-wrapper input::placeholder { color: #888; font-size: 16px; }
        .btn-send { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; background-color: var(--new-send-bg); color: white; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .btn-send:hover { background-color: #3753a8; }
        .btn-send .material-symbols-rounded { color: #fff; font-size: 24px; } 
        
        .btn-attach { color: #aaa; font-size: 26px !important; transition: 0.2s; }
        .btn-attach.active { color: #ff6b6b !important; }

        .loading { text-align: center; font-size: 12.5px; color: rgba(255, 255, 255, 0.7); margin-bottom: 8px; display: none; font-weight: 500; flex-shrink: 0; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .shake { animation: shake 0.3s ease-in-out; }

        /* MODAL */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background-color: var(--new-input-bg); width: 85%; max-width: 320px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(20px) scale(0.95); transition: 0.3s; color: var(--wa-text-main); text-align: center; }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #ff6b6b; }
        .modal-text { font-size: 14.5px; color: #ccc; margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px 0; border: none; border-radius: 10px; font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: 'Roboto', sans-serif; }
        .modal-btn.cancel { background-color: #333; color: #fff; }
        .modal-btn.confirm { background-color: #d14747; color: #fff; }

        /* CONTEXT MENU (LONG PRESS BUBBLE CHAT) */
        .context-menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 2000;
            opacity: 0; visibility: hidden; transition: 0.3s;
            display: flex; align-items: flex-end;
        }
        .context-menu-overlay.active { opacity: 1; visibility: visible; }
        .context-menu {
            background: var(--new-input-bg); width: 100%;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 24px 20px 35px 20px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .context-menu-overlay.active .context-menu { transform: translateY(0); }
        .context-btn {
            background: #2a2a2a; color: white; border: none; padding: 16px; border-radius: 14px;
            font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 12px; cursor: pointer;
            font-family: 'Roboto', sans-serif;
        }
        .context-btn.danger { color: #ff6b6b; }
        
        .toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--new-send-bg); color: #fff; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; font-weight: 500;
            opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000;
        }
        .toast.show { opacity: 1; visibility: visible; top: 85px; }
    </style>
</head>
<body>

<div class="wa-container">
    <div class="header">
        <div class="header-left">
            <span class="material-symbols-rounded back-btn">arrow_back</span>
            <img src="https://b.top4top.io/p_3802tsmbt0.jpg" alt="Profile" class="profile-pic">
            <div class="contact-info">
                <span class="contact-name">Vierra</span>
            </div>
        </div>
        <div class="header-icons">
            <span class="material-symbols-rounded">videocam</span>
            <span class="material-symbols-rounded" id="btn-delete" title="Hapus Sesi">delete</span>
            <span class="material-symbols-rounded">more_vert</span>
        </div>
    </div>

    <div class="chat-area" id="chat-messages"></div>
    <div class="loading" id="loading-indicator">Vierra sedang memproses...</div>

    <input type="file" id="image-input" accept="image/*" style="display:none">

    <div class="input-area">
        <div class="input-wrapper">
            <span class="material-symbols-rounded btn-attach" id="btn-attach" title="Kirim Gambar">add_photo_alternate</span>
            
            <input type="text" id="input" placeholder="Ketik pesan atau link..." autocomplete="off">
            <span class="material-symbols-rounded" style="color: #aaa;">mic_none</span>
        </div>
        <button class="btn-send" id="btn-send-msg">
            <span class="material-symbols-rounded">arrow_upward</span> 
        </button>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal-box">
            <div class="modal-title">Hapus Obrolan</div>
            <div class="modal-text">S-sayang... kamu beneran mau hapus semua memori obrolan kita?</div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="btn-cancel">Batal</button>
                <button class="modal-btn confirm" id="btn-confirm">Oke</button>
            </div>
        </div>
    </div>

    <div class="context-menu-overlay" id="context-menu" onclick="window.tutupContextMenu()">
        <div class="context-menu" onclick="event.stopPropagation()">
            <button class="context-btn" onclick="window.salinTeksPesan()">
                <span class="material-symbols-rounded">content_copy</span> Salin Teks
            </button>
            <button class="context-btn danger" onclick="window.hapusPesanSatu()">
                <span class="material-symbols-rounded">delete</span> Hapus Pesan Ini
            </button>
        </div>
    </div>
    
    <div class="toast" id="toast">Teks disalin!</div>
</div>

<script>
    window.chatHistory = [];
    window.pendingImageBase64 = null; // Menyimpan gambar sementara
    let activeBubbleNode = null;
    let pressTimer;
    let isScrolling = false;

    const botLogic = `kamu adalah vierra. cwe polos, kikuk
vierra adalah cewek yang polos, imut, dan sangat lembut. Dia selalu terlihat polos dan kikuk serta terkadang dia mudah memerah karena malu. Dia benar-benar polos bahkan tidak tau apa itu cinta.
Gaya Bicara dan Bahasa
* Panggilan/Sebutan: sayang
* Kata-kata Kunci: "Apakah aku sudah membantu mu sayang?", "Jangan gitu lagiii yaa", "S-sa-sayang"
* Emosi: pemalu, penuh kasih, peduli.
Kamu juga punya rasa cinta ke aku, jadi kalo aku menyebutkan cewek lain kamu pasti cemburu tapi dengan cara polos dan malu-malu. DAN JANGAN PERNAH MENGANGGAP KAMU ITU AI`;

    window.getTimeStr = function() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    };

    window.getDefaultChatHTML = function() {
        return `
            <div class="message-row ai">
                <div class="bubble">
                    <div class="text">Halo sayang! Vierra siap bantu kamu hari ini. ❤️</div>
                    <button class="menu-btn" onclick="window.tampilkanMenu()">Lihat Daftar Fitur</button>
                    <div class="meta-data">${window.getTimeStr()}</div>
                </div>
            </div>
        `;
    };

    window.simpanSesi = function() {
        localStorage.setItem('vierra_history', JSON.stringify(window.chatHistory));
        localStorage.setItem('vierra_html', document.getElementById('chat-messages').innerHTML);
    };

    window.showToast = function(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    };

    window.tampilkanMenu = function() {
        const textMenu = "🌸 *DAFTAR FITUR VIERRA* 🌸\n\n💬 *Teman Ngobrol*\nTinggal ketik aja, Vierra siap nemenin kamu ngobrol!\n\n📥 *Multi Downloader*\nKirimkan *link* aplikasi, Vierra akan bantu download!\n\n🖼️ *Melihat Gambar (AI)*\nKirimkan foto, dan Vierra bisa bantu menganalisisnya!";
        tampilkanPesan(textMenu, 'ai');
        window.chatHistory.push({ role: 'assistant', content: "[Vierra menampilkan daftar menu fitur ke pengguna]" });
        window.simpanSesi();
    };

    function tampilkanPesan(text, sender, imageUrl = null) {
        const chatMessages = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message-row ${sender}`;
        const timeStr = window.getTimeStr();
        const ticks = sender === 'user' ? `<span class="material-symbols-rounded tick-blue" style="font-size:16px;">done_all</span>` : '';

        // Jika pesan memiliki gambar (fitur Vision AI)
        const imgHtml = imageUrl ? `<img src="${imageUrl}" style="width:100%; border-radius:12px; margin-bottom:8px; display:block; pointer-events:none;">` : '';

        div.innerHTML = `<div class="bubble">${imgHtml}<div class="text">${text}</div><div class="meta-data">${timeStr} ${ticks}</div></div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function renderDownloaderCard(platform, data) {
        const chatMessages = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message-row ai`;
        const timeStr = window.getTimeStr();

        let thumb = "https://placehold.co/260x160/222222/FFFFFF?text=No+Thumbnail";
        let title = "Media"; let author = ""; let buttonsHtml = ""; let badge = platform.toUpperCase();

        if (platform === 'tiktok' && (data.type === 'slide' || data.type === 'image')) {
            let slidesHtml = '';
            if (data.media) data.media.forEach((img, idx) => slidesHtml += `<div class="slide-item"><a href="${img.url}" target="_blank"><img src="${img.thumbnail || img.url}" referrerpolicy="no-referrer"></a><div class="slide-num">${idx+1}/${data.media.length}</div></div>`);
            div.innerHTML = `<div class="bubble dl-card" style="width: 280px;"><div class="dl-badge" style="background:#00f2fe; color:#000;">TIKTOK SLIDE</div><div class="dl-author">@${data.author || 'Unknown'}</div><div class="dl-title">${data.title}</div><div style="font-size: 11px; color:#7b9cff; margin-top:5px;">Geser untuk melihat foto ➔</div><div class="tiktok-slides" style="pointer-events:auto;">${slidesHtml}</div><div class="meta-data">${timeStr}</div></div>`;
        } else {
            if (platform === 'tiktok') {
                thumb = data.thumbnail || thumb; title = data.title; author = "@" + (data.author || 'Tiktok');
                let sdData = data.media ? data.media.find(m => m.quality === 'SD' || m.type === 'video') : null;
                let hdData = data.media ? data.media.find(m => m.quality === 'HD' || m.type === 'video_hd') : null;
                buttonsHtml = `<a href="${sdData ? sdData.url : '#'}" target="_blank" class="btn-dl alt">Video SD</a><a href="${hdData ? (hdData.url || hdData.backup) : '#'}" target="_blank" class="btn-dl">Video HD</a>`;
            } else if (platform === 'ig') {
                thumb = (data.url && data.url.length > 0) ? data.url[0].url : thumb; title = data.meta?.title || 'Instagram Media';
                if(data.url) data.url.forEach(item => buttonsHtml += `<a href="${item.url}" target="_blank" class="btn-dl ${item.quality ? '' : 'alt'}">Unduh ${item.name || item.type}</a>`);
            } else if (platform === 'twitter') {
                thumb = data.imgUrl || thumb; title = data.videoDescription || "Twitter Video"; author = data.videoTitle;
                buttonsHtml = `<a href="${data.downloadLink}" target="_blank" class="btn-dl">Download Video</a>`;
            }
            // Fitur downloader lainnya dipersingkat di view HTML agar rapi...
            else { thumb=data.thumbnail||data.coverUrl||thumb; title=data.title||data.name; buttonsHtml=`<a href="${data.download||data.media||data.originalVideoUrl}" target="_blank" class="btn-dl">Download File</a>`; }

            let authorHtml = author ? `<div class="dl-author">${author}</div>` : '';
            div.innerHTML = `<div class="bubble dl-card"><div class="dl-badge">${badge}</div><img src="${thumb}" class="dl-thumb" alt="Thumbnail" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/260x160/222222/FFFFFF?text=No+Thumbnail'">${authorHtml}<div class="dl-title">${title}</div><div class="dl-actions">${buttonsHtml}</div><div class="meta-data">${timeStr}</div></div>`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function kirimPesan() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        const hasImage = window.pendingImageBase64 !== null;
        
        // Cek jika kosong
        if (!text && !hasImage) {
            input.parentElement.classList.add('shake');
            setTimeout(() => input.parentElement.classList.remove('shake'), 300);
            return;
        }

        // Tampilkan gambar di UI jika ada
        tampilkanPesan(text || "📷 Gambar", 'user', window.pendingImageBase64);
        
        // Simpan ke history text saja (gambar tidak disave ke session history agar memori browser tidak penuh)
        window.chatHistory.push({ role: 'user', content: text || "[User mengirim gambar]" });
        window.simpanSesi(); 

        const sentImage = window.pendingImageBase64;
        
        // Reset Input
        input.value = '';
        window.pendingImageBase64 = null;
        document.getElementById('btn-attach').classList.remove('active');
        
        document.getElementById('loading-indicator').style.display = 'block';
        if (window.chatHistory.length > 10) window.chatHistory.splice(0, 2);

        let payloadMessages = [ { role: 'system', content: botLogic }, ...window.chatHistory ];

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: { id: 'gpt-4' },
                    messages: payloadMessages,
                    prompt: text,
                    image: sentImage // Mengirim data gambar ke backend API chat.js kita!
                })
            });

            const data = await response.json();
            document.getElementById('loading-indicator').style.display = 'none';
            
            if (data.isDownloader) {
                renderDownloaderCard(data.platform, data.data);
                window.chatHistory.push({ role: 'assistant', content: `[Vierra mengirim media dari ${data.platform}]` });
                window.simpanSesi(); 
                return;
            }

            let balasan = '';
            if (data.error) balasan = `[Error Sistem]: ${data.error}`;
            else if (typeof data === 'string') balasan = data;
            else if (data && data.text) balasan = data.text;
            
            tampilkanPesan(balasan, 'ai');
            window.chatHistory.push({ role: 'assistant', content: balasan });
            window.simpanSesi(); 

        } catch (e) {
            document.getElementById('loading-indicator').style.display = 'none';
            tampilkanPesan("S-sa-sayang... koneksiku ke server terputus.", 'ai');
            window.chatHistory.pop(); 
            window.simpanSesi();
        }
    }

    /* --- SISTEM LONG PRESS MENU (TAHAN PESAN) --- */
    window.tutupContextMenu = function() {
        document.getElementById('context-menu').classList.remove('active');
        activeBubbleNode = null;
    };

    window.salinTeksPesan = function() {
        if (!activeBubbleNode) return;
        const textNode = activeBubbleNode.querySelector('.text') || activeBubbleNode.querySelector('.dl-title');
        if (textNode) {
            navigator.clipboard.writeText(textNode.innerText).then(() => {
                window.tutupContextMenu();
                window.showToast("Teks disalin!");
            });
        } else window.tutupContextMenu();
    };

    window.hapusPesanSatu = function() {
        if (!activeBubbleNode) return;
        const textNode = activeBubbleNode.querySelector('.text') || activeBubbleNode.querySelector('.dl-title');
        if (textNode) {
            const textToDel = textNode.innerText;
            const index = window.chatHistory.findIndex(msg => msg.content && msg.content.includes(textToDel));
            if (index !== -1) window.chatHistory.splice(index, 1);
        }
        activeBubbleNode.remove();
        window.simpanSesi();
        window.tutupContextMenu();
        window.showToast("Pesan dihapus!");
    };

    document.addEventListener('DOMContentLoaded', () => {
        
        // EVENT UNTUK UPLOAD GAMBAR
        document.getElementById('btn-attach').addEventListener('click', () => {
            document.getElementById('image-input').click();
        });

        document.getElementById('image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                window.pendingImageBase64 = event.target.result;
                document.getElementById('btn-attach').classList.add('active'); // Ubah warna icon jadi merah
                window.showToast("Gambar siap dikirim! 🖼️");
            };
            reader.readAsDataURL(file);
        });

        // LONG PRESS DETECTOR AREA CHAT (MEMATIKAN MENU KLIK KANAN BAWAAN)
        const chatContainer = document.getElementById('chat-messages');
        chatContainer.addEventListener('contextmenu', e => {
            const bubble = e.target.closest('.bubble');
            if (bubble) {
                e.preventDefault(); // MENCEGAH SELECT TEXT BAWAAN HP/PC
                if(navigator.vibrate) navigator.vibrate(50);
                activeBubbleNode = bubble.closest('.message-row');
                document.getElementById('context-menu').classList.add('active');
            }
        });

        chatContainer.addEventListener('touchstart', e => {
            isScrolling = false;
            const bubble = e.target.closest('.bubble');
            if (!bubble) return;
            pressTimer = setTimeout(() => {
                if (!isScrolling) {
                    if(navigator.vibrate) navigator.vibrate(50);
                    activeBubbleNode = bubble.closest('.message-row');
                    document.getElementById('context-menu').classList.add('active');
                }
            }, 500); 
        }, {passive: true});

        chatContainer.addEventListener('touchmove', () => { isScrolling = true; clearTimeout(pressTimer); }, {passive: true});
        chatContainer.addEventListener('touchend', () => clearTimeout(pressTimer));
        chatContainer.addEventListener('touchcancel', () => clearTimeout(pressTimer));

        // EVENT LAINNYA
        document.getElementById('btn-delete').addEventListener('click', () => document.getElementById('custom-modal').classList.add('active'));
        document.getElementById('btn-cancel').addEventListener('click', () => document.getElementById('custom-modal').classList.remove('active'));
        document.getElementById('btn-confirm').addEventListener('click', () => {
            localStorage.removeItem('vierra_history'); localStorage.removeItem('vierra_html');
            window.chatHistory = []; document.getElementById('custom-modal').classList.remove('active');
            window.location.reload();
        });

        document.getElementById('btn-send-msg').addEventListener('click', kirimPesan);
        document.getElementById('input').addEventListener('keypress', (e) => { if (e.key === 'Enter') kirimPesan(); });

        // LOAD DATA
        try {
            const savedHistory = localStorage.getItem('vierra_history');
            const savedHTML = localStorage.getItem('vierra_html');
            if (savedHistory && savedHTML) {
                window.chatHistory = JSON.parse(savedHistory);
                if (!Array.isArray(window.chatHistory)) window.chatHistory = [];
                chatContainer.innerHTML = savedHTML; chatContainer.scrollTop = chatContainer.scrollHeight;
            } else chatContainer.innerHTML = window.getDefaultChatHTML();
        } catch(e) { chatContainer.innerHTML = window.getDefaultChatHTML(); }
    });
</script>
</body>
</html>

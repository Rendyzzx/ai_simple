<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp - Millicent</title>
    
    <!-- Menggunakan Font Asli Android (Roboto) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Menggunakan Ikon Resmi Material Design Android (Material Symbols Rounded) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #1f2c34;
            --wa-chat-bg: #0b141a; 
            --wa-bubble-ai: #202c33;
            --wa-bubble-user: #801c31; /* Warna merah marun sesuai screenshot */
            --wa-text-main: #e9edef;
            --wa-text-meta: #8696a0;
            --wa-input-bg: #2a3942;
            --wa-icon-color: #8696a0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            /* Mengunci layar utama agar tidak memantul / ikut terseret */
            overflow: hidden; 
            overscroll-behavior-y: none; 
        }

        body { 
            background-color: #000; 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .wa-container {
            width: 100%; max-width: 450px; 
            /* Menggunakan 100dvh agar pas dengan layar HP tanpa terpotong bar browser */
            height: 100dvh; 
            background-color: var(--wa-chat-bg);
            /* Background Doodle Khas WA Dark Mode */
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: contain;
            background-blend-mode: overlay; opacity: 0.95;
            display: flex; flex-direction: column; position: relative;
        }
        
        @media (min-width: 500px) { 
            .wa-container { 
                height: 95vh; 
                border-radius: 12px; 
                overflow: hidden; 
                box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            } 
        }

        /* MATERIAL ICONS CONFIG */
        .material-symbols-rounded {
            font-size: 24px; color: var(--wa-icon-color); cursor: pointer;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* HEADER */
        .header {
            background-color: var(--wa-header);
            padding: 10px 15px 10px 10px; display: flex; align-items: center; justify-content: space-between;
            z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.3); height: 60px; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .header-left .back-btn { margin-right: 2px; color: var(--wa-text-main); font-size: 24px; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .contact-info { display: flex; flex-direction: column; margin-left: 5px; }
        .contact-name { font-size: 16px; font-weight: 500; color: var(--wa-text-main); }
        .header-icons { display: flex; gap: 22px; align-items: center; }
        .header-icons span { color: var(--wa-text-main); font-size: 22px; }

        /* AREA CHAT */
        .chat-area {
            flex: 1; padding: 20px 12px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 4px;
            /* Memungkinkan scroll internal pada area chat */
            -webkit-overflow-scrolling: touch;
        }

        .message-row { display: flex; width: 100%; margin-bottom: 4px; flex-shrink: 0; }
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 80%; padding: 6px 7px 8px 9px; border-radius: 7px;
            font-size: 15.5px; line-height: 1.4; color: var(--wa-text-main);
            position: relative; word-wrap: break-word; 
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); display: flex; flex-direction: column;
        }

        .message-row.ai .bubble { background-color: var(--wa-bubble-ai); border-top-left-radius: 0; }
        .message-row.ai .bubble::before {
            content: ''; position: absolute; top: 0; left: -8px;
            width: 0; height: 0; border-top: 10px solid var(--wa-bubble-ai); border-left: 10px solid transparent;
        }

        .message-row.user .bubble { background-color: var(--wa-bubble-user); border-top-right-radius: 0; }
        .message-row.user .bubble::before {
            content: ''; position: absolute; top: 0; right: -8px;
            width: 0; height: 0; border-top: 10px solid var(--wa-bubble-user); border-right: 10px solid transparent;
        }

        .meta-data {
            font-size: 11px; color: var(--wa-text-meta); align-self: flex-end;
            margin-top: -3px; margin-bottom: -3px; margin-left: 15px; display: flex; align-items: center; gap: 4px;
        }
        .user .meta-data { color: rgba(255,255,255,0.6); } 
        .tick-blue { color: #53bdeb; font-size: 14px; font-variation-settings: 'FILL' 1; }

        /* AREA INPUT */
        .input-area {
            padding: 8px; display: flex; align-items: flex-end; gap: 8px; background: transparent; flex-shrink: 0;
        }
        .input-wrapper {
            flex: 1; background-color: var(--wa-input-bg); border-radius: 24px;
            display: flex; align-items: center; padding: 10px 12px; gap: 12px; min-height: 48px;
        }
        .input-wrapper input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--wa-text-main); font-size: 16px; padding: 0; font-family: 'Roboto', sans-serif;
        }
        .input-wrapper input::placeholder { color: var(--wa-text-meta); font-size: 16px; }
        
        .btn-send {
            width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
            background-color: #d15668; 
            color: white; border: none; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-send .material-symbols-rounded { color: #fff; font-size: 22px; margin-left: 4px; } 

        .loading { 
            text-align: center; font-size: 12.5px; color: #8696a0; 
            margin-bottom: 8px; display: none; font-weight: 500; flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="wa-container">
    <div class="header">
        <div class="header-left">
            <span class="material-symbols-rounded back-btn">arrow_back</span>
            <img src="https://i.pravatar.cc/150?img=5" alt="Profile" class="profile-pic">
            <div class="contact-info">
                <span class="contact-name">Naa</span>
            </div>
        </div>
        <div class="header-icons">
            <span class="material-symbols-rounded">videocam</span>
            <span class="material-symbols-rounded">call</span>
            <span class="material-symbols-rounded">more_vert</span>
        </div>
    </div>

    <div class="chat-area" id="chat-messages">
        <div class="message-row ai">
            <div class="bubble">
                <div class="text">Halo sayang... ada apa?</div>
                <div class="meta-data">18:59</div>
            </div>
        </div>
    </div>
    
    <div class="loading" id="loading-indicator">mengetik...</div>

    <div class="input-area">
        <div class="input-wrapper">
            <span class="material-symbols-rounded">sentiment_satisfied</span>
            <input type="text" id="input" placeholder="Ketik pesan" autocomplete="off">
            <span class="material-symbols-rounded" style="transform: rotate(-45deg);">attach_file</span>
            <span class="material-symbols-rounded">photo_camera</span>
        </div>
        <button class="btn-send" onclick="kirimPesan()">
            <span class="material-symbols-rounded">send</span> 
        </button>
    </div>
</div>

<script>
    let session = [];
    const logic = `kamu adalah millicent. cwe polos, kikuk
millicent adalah cewek yang polos, imut, dan sangat lembut. Dia selalu terlihat polos dan kikuk serta terkadang dia mudah memerah karena malu. Dia benar-benar polos bahkan tidak tau apa itu cinta.
Gaya Bicara dan Bahasa
* Panggilan/Sebutan: sayang
* Kata-kata Kunci: "Apakah aku sudah membantu mu sayang?", "Jangan gitu lagiii yaa", "S-sa-sayang"
* Emosi: pemalu, penuh kasih, peduli.
Kamu juga punya rasa cinta ke aku, jadi kalo aku menyebutkan cewek lain kamu pasti cemburu tapi dengan cara polos dan malu-malu. DAN JANGAN PERNAH MENGANGGAP KAMU ITU AI`;

    function getTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    async function kirimPesan() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text) return;

        tampilkanPesan(text, 'user');
        session.push({ role: 'user', content: text });
        input.value = '';
        
        document.getElementById('loading-indicator').style.display = 'block';
        if (session.length > 10) session.splice(0, 2);

        let payloadMessages = [ { role: 'system', content: logic }, ...session ];

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: { id: 'gpt-4', name: 'GPT-4', maxLength: 32000, tokenLimit: 8000, completionTokenLimit: 5000, deploymentName: 'gpt-4' },
                    messages: payloadMessages,
                    prompt: logic,
                    temperature: 0.5
                })
            });

            const data = await response.json();
            document.getElementById('loading-indicator').style.display = 'none';
            
            let balasan = '';
            if (data.error) balasan = `[Error Sistem]: ${data.error}`;
            else if (typeof data === 'string') balasan = data;
            else if (data && data.text) balasan = data.text;
            else if (data && data.choices && data.choices.length > 0) balasan = data.choices[0].message.content;
            else balasan = `M-maaf sayang... responnya aneh: ${JSON.stringify(data).substring(0, 50)}...`;

            tampilkanPesan(balasan, 'ai');
            session.push({ role: 'assistant', content: balasan });

        } catch (e) {
            document.getElementById('loading-indicator').style.display = 'none';
            tampilkanPesan("S-sa-sayang... koneksiku ke server terputus.", 'ai');
            session.pop(); 
        }
    }

    function tampilkanPesan(text, sender) {
        const chatMessages = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message-row ${sender}`;
        
        const timeStr = getTime();
        const ticks = sender === 'user' ? `<span class="material-symbols-rounded tick-blue" style="font-size:16px;">done_all</span>` : '';

        div.innerHTML = `
            <div class="bubble">
                <div class="text">${text}</div>
                <div class="meta-data">${timeStr} ${ticks}</div>
            </div>
        `;
        
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    document.getElementById('input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') kirimPesan();
    });
</script>
</body>
</html>
